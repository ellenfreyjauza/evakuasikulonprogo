<!-- ===================================================== -->
<!-- ===== 8. FILTER POLYGON KERAWANAN ===== -->
<!-- ===================================================== -->

<script>

document
.getElementById("filterRiskButton")
.addEventListener(
  "click",
  () => {

    if (map.hasLayer(kerawananLayer)) {

      map.removeLayer(kerawananLayer);

    }

    else {

      map.addLayer(kerawananLayer);

    }

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 9. TAMPILKAN SEMUA LAYER ===== -->
<!-- ===================================================== -->

<script>

document
.getElementById("showAllButton")
.addEventListener(
  "click",
  () => {

    if (!map.hasLayer(kerawananLayer)) {

      map.addLayer(kerawananLayer);

    }

    if (!map.hasLayer(lineLayer)) {

      map.addLayer(lineLayer);

    }

    if (
      typeof pointLayer !== "undefined"
      &&
      !map.hasLayer(pointLayer)
    ) {

      map.addLayer(pointLayer);

    }

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 10. PRINT PETA ===== -->
<!-- ===================================================== -->

<script>

document
.getElementById("printButton")
.addEventListener(
  "click",
  () => {

    window.print();

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 11. HAPUS RUTE ===== -->
<!-- ===================================================== -->

<script>

document
.getElementById("clearRouteButton")
.addEventListener(
  "click",
  () => {

    if (customRouteLayer) {

      map.removeLayer(customRouteLayer);

      customRouteLayer = null;

    }

    document
    .getElementById(
      "bestRouteSummary"
    )
    .innerHTML = `
      Belum ada rute dibuat
    `;

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 12. ZOOM KE SELURUH DATA ===== -->
<!-- ===================================================== -->

<script>

document
.getElementById("zoomAllButton")
.addEventListener(
  "click",
  () => {

    const group = L.featureGroup([
      kerawananLayer,
      lineLayer
    ]);

    const bounds =
      group.getBounds();

    if (bounds.isValid()) {

      map.fitBounds(
        bounds,
        {
          padding: [30, 30]
        }
      );

    }

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 13. MODE JALUR AKTIF ===== -->
<!-- ===================================================== -->

<script>

let roadMode = false;

document
.getElementById("roadStatusButton")
.addEventListener(
  "click",
  () => {

    roadMode = !roadMode;

    lineLayer.eachLayer(layer => {

      if (roadMode) {

        layer.setStyle({

          color: "#16a34a",
          dashArray: "10,6",
          weight: 4

        });

      }

      else {

        layer.setStyle({

          color: "#2563eb",
          dashArray: null,
          weight: 4

        });

      }

    });

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 14. TITIK TERDEKAT ===== -->
<!-- ===================================================== -->

<script>

document
.getElementById("nearestShelterButton")
.addEventListener(
  "click",
  () => {

    if (!userMarker) {

      alert(
        "Aktifkan lokasi terlebih dahulu"
      );

      return;

    }

    if (
      typeof pointLayer === "undefined"
    ) {

      alert(
        "Layer titik belum tersedia"
      );

      return;

    }

    let nearest = null;

    let nearestDistance =
      Infinity;

    pointLayer.eachLayer(layer => {

      const dist =
        map.distance(
          userMarker.getLatLng(),
          layer.getLatLng()
        );

      if (
        dist < nearestDistance
      ) {

        nearestDistance = dist;
        nearest = layer;

      }

    });

    if (nearest) {

      map.setView(
        nearest.getLatLng(),
        16
      );

      nearest.openPopup();

    }

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 15. INFORMASI POSISI MAP ===== -->
<!-- ===================================================== -->

<script>

map.on(
  "moveend",
  () => {

    const center =
      map.getCenter();

    const zoom =
      map.getZoom();

    const info =
`
Lat:
${center.lat.toFixed(5)}

Lng:
${center.lng.toFixed(5)}

Zoom:
${zoom}
`;

    const box =
      document.getElementById(
        "mapInfo"
      );

    if (box) {

      box.innerText = info;

    }

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 16. SCALE BAR ===== -->
<!-- ===================================================== -->

<script>

L.control.scale({
  imperial: false
}).addTo(map);

</script>



<!-- ===================================================== -->
<!-- ===== 17. KLIK KOORDINAT ===== -->
<!-- ===================================================== -->

<script>

map.on(
  "click",
  function(e) {

    const lat =
      e.latlng.lat.toFixed(6);

    const lng =
      e.latlng.lng.toFixed(6);

    L.popup()

      .setLatLng(e.latlng)

      .setContent(
        `
        <b>Koordinat</b><br>
        Lat: ${lat}<br>
        Lng: ${lng}
        `
      )

      .openOn(map);

  }
);

</script>



<!-- ===================================================== -->
<!-- ===== 18. AUTO CLOSE POPUP ===== -->
<!-- ===================================================== -->

<script>

map.on(
  "popupopen",
  function(e) {

    setTimeout(() => {

      map.closePopup(e.popup);

    }, 6000);

  }
);

</script>
