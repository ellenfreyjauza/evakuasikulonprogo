<!-- ===== 1. ROUTE SUMMARY DINAMIS ===== -->

<script>

const gatheringPoints = {
  samigaluh: [-7.658, 110.128],
  girimulyo: [-7.792, 110.145],
  kalibawang: [-7.704, 110.234]
};

const settlementPoints = {
  samigaluh: [-7.670, 110.120],
  girimulyo: [-7.800, 110.150],
  kalibawang: [-7.710, 110.240]
};

let customRouteLayer = null;

function calculateDistance(a, b) {

  return (
    map.distance(
      L.latLng(a[0], a[1]),
      L.latLng(b[0], b[1])
    ) / 1000
  ).toFixed(2);

}

function buildRoute() {

  const originSelect =
    document.getElementById("routeOrigin").value;

  const destinationSelect =
    document.getElementById("routeDestination").value;

  const strategy =
    document.getElementById("routeStrategy").value;

  let origin;

  if (originSelect === "mapCenter") {

    const center = map.getCenter();

    origin = [center.lat, center.lng];

  }

  else if (originSelect === "user") {

    if (userMarker) {

      origin = [
        userMarker.getLatLng().lat,
        userMarker.getLatLng().lng
      ];

    } else {

      alert("Lokasi pengguna belum tersedia");
      return;

    }

  }

  else {

    origin = settlementPoints[originSelect];

  }

  let destination;

  if (destinationSelect === "nearest") {

    let nearest = null;
    let nearestDistance = Infinity;

    Object.keys(gatheringPoints).forEach(key => {

      const dist = map.distance(
        origin,
        gatheringPoints[key]
      );

      if (dist < nearestDistance) {

        nearestDistance = dist;
        nearest = gatheringPoints[key];

      }

    });

    destination = nearest;

  }

  else {

    destination = gatheringPoints[destinationSelect];

  }

  if (customRouteLayer) {
    map.removeLayer(customRouteLayer);
  }

  customRouteLayer = L.polyline(
    [origin, destination],
    {
      color:
        strategy === "safe"
        ? "#16a34a"
        : strategy === "short"
        ? "#0057b8"
        : "#f97316",

      weight: 4,
      opacity: 0.95,
      dashArray:
        strategy === "activeOnly"
        ? "8,8"
        : null
    }
  ).addTo(map);

  const distance =
    calculateDistance(origin, destination);

  const duration =
    Math.ceil(distance * 14);

  map.fitBounds(
    customRouteLayer.getBounds(),
    { padding: [40, 40] }
  );

  updateBestRoute(
    strategy,
    distance,
    duration
  );

}

function updateBestRoute(
  strategy,
  distance,
  duration
) {

  const container =
    document.getElementById(
      "bestRouteSummary"
    );

  const riskText =
    strategy === "safe"
    ? "Risiko rendah"
    : strategy === "short"
    ? "Risiko sedang"
    : "Jalur aktif terbatas";

  container.innerHTML = `

    <h3>
      Rute berhasil dibuat
    </h3>

    <p>
      Strategi rute:
      <b>${strategy}</b>
    </p>

    <div class="best-route-grid">

      <div class="best-route-metric">
        <strong>${distance} km</strong>
        <span>Estimasi jarak</span>
      </div>

      <div class="best-route-metric">
        <strong>${duration} menit</strong>
        <span>Waktu tempuh</span>
      </div>

    </div>

    <br>

    <span class="risk-badge risk-low">
      ${riskText}
    </span>

  `;

}

document
.getElementById("buildRouteButton")
.addEventListener(
  "click",
  buildRoute
);

</script>



<!-- ===== 2. FITUR LOKASI SAYA ===== -->

<script>

let userMarker = null;

document
.getElementById("locateButton")
.addEventListener(
  "click",
  () => {

    if (!navigator.geolocation) {

      alert(
        "Browser tidak mendukung GPS"
      );

      return;

    }

    navigator.geolocation.getCurrentPosition(

      position => {

        const lat =
          position.coords.latitude;

        const lng =
          position.coords.longitude;

        if (userMarker) {
          map.removeLayer(userMarker);
        }

        userMarker = L.circleMarker(
          [lat, lng],
          {
            radius: 7,
            fillColor: "#2563eb",
            color: "#ffffff",
            weight: 2,
            fillOpacity: 1
          }
        ).addTo(map);

        userMarker.bindPopup(
          "<b>Lokasi Anda</b>"
        );

        map.setView([lat, lng], 15);

      },

      () => {

        alert(
          "Lokasi gagal didapatkan"
        );

      }

    );

  }

);

</script>



<!-- ===== 3. RESET PETA ===== -->

<script>

document
.getElementById("resetButton")
.addEventListener(
  "click",
  () => {

    map.setView(
      [-7.74, 110.18],
      11
    );

  }
);

</script>



<!-- ===== 4. FILTER LAYER ===== -->

<script>

document
.getElementById("filterRouteButton")
.addEventListener(
  "click",
  () => {

    if (map.hasLayer(lineLayer)) {

      map.removeLayer(lineLayer);

    }

    else {

      map.addLayer(lineLayer);

    }

  }
);

document
.getElementById("filterShelterButton")
.addEventListener(
  "click",
  () => {

    if (map.hasLayer(pointLayer)) {

      map.removeLayer(pointLayer);

    }

    else {

      map.addLayer(pointLayer);

    }

  }
);

</script>



<!-- ===== 5. COPY KOORDINAT ===== -->

<script>

document
.getElementById("copyViewButton")
.addEventListener(
  "click",
  () => {

    const center =
      map.getCenter();

    const text = `
Lat:
${center.lat.toFixed(6)}

Lng:
${center.lng.toFixed(6)}
`;

    navigator.clipboard
    .writeText(text);

    alert(
      "Koordinat berhasil disalin"
    );

  }
);

</script>



<!-- ===== 6. SAFE MODE ===== -->

<script>

document
.getElementById("safeModeButton")
.addEventListener(
  "click",
  () => {

    map.eachLayer(layer => {

      if (
        layer instanceof L.Polygon
      ) {

        layer.setStyle({

          fillOpacity: 0.55,
          opacity: 1

        });

      }

    });

    alert(
      "Mode darurat aktif"
    );

  }
);

</script>



<!-- ===== 7. SEARCH LOKASI ===== -->

<script>

document
.getElementById("searchButton")
.addEventListener(
  "click",
  () => {

    const value =
      document
      .getElementById("searchInput")
      .value
      .toLowerCase();

    if (
      value.includes("samigaluh")
    ) {

      map.setView(
        [-7.67, 110.12],
        14
      );

    }

    else if (
      value.includes("girimulyo")
    ) {

      map.setView(
        [-7.80, 110.15],
        14
      );

    }

    else if (
      value.includes("kalibawang")
    ) {

      map.setView(
        [-7.71, 110.24],
        14
      );

    }

    else {

      alert(
        "Lokasi tidak ditemukan"
      );

    }

  }
);

</script>
